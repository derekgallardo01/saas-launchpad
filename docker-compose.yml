services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saaspassword
      POSTGRES_DB: saas_launchpad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://saas:saaspassword@db:5432/saas_launchpad
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-change-in-production
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

volumes:
  postgres_data:
